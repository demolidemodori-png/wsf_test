<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #fff;
  }

  #container {
    width: 100%;
    height: 100%;
    position: relative;
    background: #fff;
    overflow: hidden;
    cursor: default;
  }

  #video-wrap {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  #scroll-zone {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    overflow-y: scroll;
    z-index: 10;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  #scroll-zone::-webkit-scrollbar { display: none; }

  #scroll-inner {
    height: 3000px;
    width: 100%;
  }

  #click-zone {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 20;
    display: none;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="container">
  <div id="video-wrap">
    <video id="player" preload="auto" playsinline muted></video>
  </div>

  <div id="scroll-zone">
    <div id="scroll-inner"></div>
  </div>

  <div id="click-zone"></div>
</div>

<script>
const VIDEOS = [
  {
    url: 'https://freight.cargo.site/t/original/i/G3045581442684449421394077856682/wsf1.1.mp4',
    mode: 'step'
  }
];

const STEP_SCROLL_THRESHOLD = 60;
const SCRUB_SENSITIVITY     = 0.5;

let currentIndex  = 0;
let isPlaying     = false;
let finished      = false;
let lastScrollTop = 1000;
let accumulated   = 0;

const player     = document.getElementById('player');
const scrollZone = document.getElementById('scroll-zone');
const clickZone  = document.getElementById('click-zone');

function loadVideo(index) {
  if (index >= VIDEOS.length) {
    showEnd();
    return;
  }
  currentIndex = index;
  finished     = false;
  isPlaying    = false;
  accumulated  = 0;
  clickZone.style.display = 'none';

  const v = VIDEOS[index];
  player.src = v.url;
  player.load();
  player.currentTime = 0;
}

function triggerStepPlay() {
  if (isPlaying || finished) return;
  isPlaying = true;
  player.play();
}

player.addEventListener('ended', () => {
  isPlaying = false;
  finished  = true;
  clickZone.style.display = 'block';
});

scrollZone.scrollTop = lastScrollTop;

// スクロール（PC）
scrollZone.addEventListener('scroll', () => {
  const st    = scrollZone.scrollTop;
  const delta = st - lastScrollTop;
  lastScrollTop = st;

  if (st < 200 || st > 2800) {
    scrollZone.scrollTop = 1000;
    lastScrollTop = 1000;
    return;
  }

  const v = VIDEOS[currentIndex];
  if (v.mode === 'step') {
    handleStep(delta);
  } else {
    handleScrub(delta);
  }
});

// タッチ（モバイル）
let touchStartY = 0;
scrollZone.addEventListener('touchstart', (e) => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });

scrollZone.addEventListener('touchmove', (e) => {
  const delta = touchStartY - e.touches[0].clientY;
  touchStartY = e.touches[0].clientY;

  const v = VIDEOS[currentIndex];
  if (v.mode === 'step') {
    handleStep(delta);
  } else {
    handleScrub(delta);
  }
}, { passive: true });

function handleStep(delta) {
  if (delta <= 0) return;

  if (!finished) {
    accumulated += delta;
    if (accumulated >= STEP_SCROLL_THRESHOLD) {
      accumulated = 0;
      triggerStepPlay();
    }
  } else {
    accumulated += delta;
    if (accumulated >= STEP_SCROLL_THRESHOLD) {
      accumulated = 0;
      loadVideo(currentIndex + 1);
    }
  }
}

function handleScrub(delta) {
  if (isNaN(player.duration)) return;
  const seekAmount = delta * SCRUB_SENSITIVITY / 100;
  player.currentTime = Math.max(0, Math.min(player.duration, player.currentTime + seekAmount));

  if (delta > 0 && player.currentTime >= player.duration - 0.1) {
    loadVideo(currentIndex + 1);
  }
}

function showEnd() {
  clickZone.style.display = 'block';
}

clickZone.addEventListener('click', () => {
  clickZone.style.display = 'none';
  const next = currentIndex + 1;
  if (next >= VIDEOS.length) {
    loadVideo(0);
  } else {
    loadVideo(next);
  }
});

loadVideo(0);
</script>
</body>
</html>
